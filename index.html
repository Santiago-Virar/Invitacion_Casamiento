<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación de Casamiento</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="contenedor">


    <!-- PORTADA -->
    <section class="seccion-img">
      <img src="img/portada.png" alt="Portada">
    </section>

    <!-- FRASE -->
    <section class="frase">
      <h1>Nos Casamos</h1>
      <p>
        Existe un hilo rojo invisible que conecta a aquellos
        que están destinados a encontrarse, sin importar
        el tiempo, el lugar o las circunstancias.
      </p>
    </section>


    <!-- MUSICA -->
    <section class="musica">
        <script src="https://cdn.commoninja.com/sdk/latest/commonninja.js" defer></script>
        <div class="commonninja_component pid-267e44c0-0411-47e4-93c8-93aadd0c7115"></div>
    </section>


    <!-- FECHA -->
    <section class="seccion-img">
      <img src="img/fecha.png" alt="Galería 1">
    </section>


    <!-- EL GRAN DIA -->
    <section class="seccion-img">
      <img src="img/dia.png" alt="Galería 1">
    </section>

    <!-- CONTADOR -->
    <section class="contador">
      <h2>Faltan</h2>

      <div class="timer">
        <div>
          <span id="dias">00</span>
          <p>Días</p>
        </div>

        <div>
          <span id="horas">00</span>
          <p>Hs</p>
        </div>

        <div>
          <span id="minutos">00</span>
          <p>Min</p>
        </div>

        <div>
          <span id="segundos">00</span>
          <p>Seg</p>
        </div>
      </div>
    </section>

    <!-- IGLESIA -->
    <section class="seccion-img">
        <a href="https://maps.app.goo.gl/gtysTLEZ1ruF9ntZ9?g_st=aw" target="_blank">
            <img src="img/ubi2.png" alt="Ubicación Iglesia">
        </a>
    </section>

    <!-- FIESTA -->
    <section class="seccion-img">
      <a href="https://maps.app.goo.gl/AUuzAQcm3TGh8xPf6?g_st=aw" target="_blank">
        <img src="img/ubi1.png" alt="Ubicación Fiesta">
      </a>
    </section>

    <!-- DRESS CODE -->
    <section class="seccion-img">
      <img src="img/dresscode.png" alt="Galería 1">
    </section>

    <!-- ASISTENCIA -->
    <section class="seccion-img">
      <a href="https://maps.app.goo.gl/AUuzAQcm3TGh8xPf6?g_st=aw" target="_blank">
        <img src="img/asistencia.png" alt="Confirmar Asistencia">
      </a>
    </section>


    <!-- ALBUM DE FOTOS -->
    <section class="seccion-img">
      <a href="https://maps.app.goo.gl/AUuzAQcm3TGh8xPf6?g_st=aw" target="_blank">
        <img src="img/album.png" alt="Álbum de Fotos">
      </a>
    </section>

    
    <!-- FOTO FINAL -->
    <section class="seccion-img">
      <img src="img/final.png" alt="Galería 1">
    </section>


    <!-- FOOTER -->
    <section class="footer">
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
