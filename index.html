<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación de Casamiento</title>
  <!-- Google Fonts -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <link
  rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💍</text></svg>">
</head>
<body>

  <div class="contenedor">


    <!-- PORTADA -->
    <section class="seccion-img">
      <img src="img/portada3.png" alt="Portada">
    </section>

    <!-- FRASE -->
    <section class="frase">
      <h2>Nos Casamos</h2>
        <p>
          Existe un hilo rojo invisible que conecta a aquellos
          que están destinados a encontrarse, sin importar
          el tiempo, el lugar o las circunstancias.
        </p>
    </section>


    <!-- MUSICA -->
    <section class="musica">
        <script src="https://cdn.commoninja.com/sdk/latest/commonninja.js" defer></script>
        <div class="commonninja_component pid-267e44c0-0411-47e4-93c8-93aadd0c7115"></div>
    </section>


    <!-- FECHA -->
    <section class="seccion-img">
      <img src="img/fecha.png" alt="Galería 1">
    </section>


    <!-- EL GRAN DIA -->
    <section class="seccion-img">
      <img src="img/dia.png" alt="Galería 1">
    </section>

    <!-- CONTADOR -->
    <section class="contador">
      <h2>Faltan</h2>

      <div class="timer">
        <div>
          <span id="dias">00</span>
          <p>Días</p>
        </div>

        <div>
          <span id="horas">00</span>
          <p>Hs</p>
        </div>

        <div>
          <span id="minutos">00</span>
          <p>Min</p>
        </div>

        <div>
          <span id="segundos">00</span>
          <p>Seg</p>
        </div>
      </div>
    </section>

    <!-- IGLESIA -->
    <section class="seccion-img">
        <a href="https://maps.app.goo.gl/gtysTLEZ1ruF9ntZ9?g_st=aw" target="_blank">
            <img src="img/ubi2.png" alt="Ubicación Iglesia">
        </a>
    </section>

    <!-- FIESTA -->
    <section class="seccion-img">
      <a href="https://maps.app.goo.gl/AUuzAQcm3TGh8xPf6?g_st=aw" target="_blank">
        <img src="img/ubi1.png" alt="Ubicación Fiesta">
      </a>
    </section>

    <!-- DRESS CODE -->
    <section class="seccion-img">
      <img src="img/dresscode.png" alt="Galería 1">
    </section>

    <!-- ASISTENCIA -->
    <section class="seccion-img">
      <a href="https://docs.google.com/forms/d/e/1FAIpQLScvvwY3MnQ2KwZXDhFcd2K-TKF4QgvK-sVotVwZEPc8pQxuiw/viewform?usp=publish-editor" target="_blank">
        <img src="img/asistencia.png" alt="Confirmar Asistencia">
      </a>
    </section>


    <!-- ALBUM DE FOTOS -->
    <section class="seccion-img">
      <a href="https://photos.app.goo.gl/L9aKBrK8mSENG7LY6" target="_blank">
        <img src="img/album.png" alt="Álbum de Fotos">
      </a>
    </section>

    <!-- REGALO -->
    <section class="seccion-img">
        <img src="img/regalo.png" alt="Álbum de Fotos">
    </section>

    
    <!-- FOTO FINAL -->
    <section class="seccion-img">
      <img src="img/final.png" alt="Galería 1">
    </section>

    <!-- FOOTER -->

    <footer class="footer-autor">

      <p> Creado e ilustrado por Santiago Virar</p>

        <a 
          href="https://www.instagram.com/santiago.virar/"
          target="_blank">
          <i class="fa-brands fa-instagram"></i>
        </a>

    </footer>

  </div>
  

  <script src="script.js"></script>
</body>
</html>
